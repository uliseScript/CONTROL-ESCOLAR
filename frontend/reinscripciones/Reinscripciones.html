<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reinscripciones</title>
    <link rel="stylesheet" href="Reinscripciones.css">
</head>
<body>
    <div class="contenedor">
        <h1>Reinscripción de Alumnos</h1>
        <form id="formReinscripcion">
            <input type="text" id="matricula" placeholder="Matrícula" required>
            <input type="number" id="semestre" placeholder="Nuevo Semestre" required>
            <input type="date" id="fecha_reinscripcion" required>
            <button type="submit">Reinscribir</button>
        </form>
        <div id="mensaje"></div>
    </div>
    <script src="Reinscripciones.js"></script>
</body>
</html>
