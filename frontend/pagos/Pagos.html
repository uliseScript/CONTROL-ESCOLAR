<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos</title>
    <link rel="stylesheet" href="Pagos.css">
</head>
<body>
    <div class="contenedor">
        <h1>Registro de Pagos</h1>
        <form id="formPago">
            <input type="text" id="matricula" placeholder="Matrícula" required>
            <input type="text" id="concepto" placeholder="Concepto" required>
            <input type="number" id="monto" placeholder="Monto" step="0.01" required>
            <input type="date" id="fecha_pago" required>
            <select id="status" required>
                <option value="">Estado del pago</option>
                <option value="pagado">Pagado</option>
                <option value="pendiente">Pendiente</option>
                <option value="vencido">Vencido</option>
            </select>
            <button type="submit">Registrar Pago</button>
        </form>
        <div id="mensaje"></div>
    </div>
    <script src="Pagos.js"></script>
</body>
</html>
