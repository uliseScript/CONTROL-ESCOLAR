<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio de Carrera</title>
    <link rel="stylesheet" href="CambioCarrera.css">
</head>
<body>
    <div class="contenedor">
        <h1>Cambio de Carrera</h1>
        <form id="formCambio">
            <input type="text" id="matricula" placeholder="Matrícula" required>
            <input type="text" id="carrera_anterior" placeholder="Carrera Actual" required>
            <input type="text" id="carrera_nueva" placeholder="Nueva Carrera" required>
            <textarea id="motivo" placeholder="Motivo del cambio"></textarea>
            <input type="date" id="fecha_cambio" required>
            <button type="submit">Registrar Cambio</button>
        </form>
        <div id="mensaje"></div>
    </div>
    <script src="CambioCarrera.js"></script>
</body>
</html>
