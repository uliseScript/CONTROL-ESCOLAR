<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Profesores</title>
    <link rel="stylesheet" href="EvaluacionProfesores.css">
</head>
<body>
    <div class="contenedor">
        <h1>Evaluación de Profesores</h1>
        <form id="formEvaluacion">
            <input type="text" id="matricula" placeholder="Matrícula del Alumno" required>
            <input type="number" id="profesor_id" placeholder="ID del Profesor" required>
            <input type="number" id="puntaje" placeholder="Puntaje (1-10)" min="1" max="10" required>
            <textarea id="comentario" placeholder="Comentario"></textarea>
            <input type="date" id="fecha_evaluacion" required>
            <button type="submit">Enviar Evaluación</button>
        </form>
        <div id="mensaje"></div>
    </div>
    <script src="EvaluacionProfesores.js"></script>
</body>
</html>
